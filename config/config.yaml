portfolio_monitor:
  portfolio_path: "config/portfolios"
  aggregate_cache_path: "config/aggregate_cache.db"
  settings_path: "config/settings.yaml"
  session_store_path: "config/sessions.yaml"
  auth_key: "${private.portfolio_monitor.auth_key}"

  dashboard:
    username: "${private.portfolio_monitor.dashboard.username}"
    password: "${private.portfolio_monitor.dashboard.password}"

  openclaw:
    agent_id: "main"
    auth_key: "${private.openclaw.auth_key}"
    session_key: "hook:main:portfolio_alerts"
    gateway_token: "${private.openclaw.gateway_token}"
    gateway_password: "${private.openclaw.gateway_password}"
    alert_enable_http: false
    websocket:
      enabled: false
      extra_prompt: |
        This is an automated alert generated by the Portfolio Monitor.  It is delivered in a channel directly to
        the agent.  There is no human present in this session.  You, the agent, are expected to use your own
        judgement to process this alert.  Do not ask for human input or confirmation in this session.  Believe in
        yourself.

polygon:
  api_key: "${private.polygon.api_key}"
